<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      html,body{margin:0}
      .shot{
        width:1280px;height:800px;box-sizing:border-box;
        display:flex;align-items:center;gap:56px;padding:0 72px;
        background:radial-gradient(120% 80% at 15% 0%, #f6f1e8 0%, #ecdfca 55%, #e2cfb0 100%);
        font-family:system-ui,"Malgun Gothic",sans-serif;color:#3b2f26;overflow:hidden;
      }
      .copy{flex:1;min-width:0}
      .badge{display:inline-block;background:#fae9dc;color:#a3492a;font-weight:800;
        font-size:15px;padding:6px 14px;border-radius:999px;margin-bottom:22px}
      h1{font-size:52px;line-height:1.18;margin:0 0 20px;letter-spacing:-1.5px;font-weight:800}
      h1 .hl{color:#bd5a34}
      ul{list-style:none;padding:0;margin:0;font-size:20px;line-height:1.35;color:#5b4a3d}
      li{display:flex;align-items:flex-start;gap:11px;margin:14px 0;font-weight:600}
      li b{color:#3b2f26}
      .chk{flex:0 0 26px;width:26px;height:26px;border-radius:50%;background:#bd5a34;color:#fff;
        display:flex;align-items:center;justify-content:center;font-size:15px;margin-top:1px}
      .foot{margin-top:26px;font-size:15px;color:#8f7e6f;font-weight:600}
      .panelframe{
        flex:0 0 392px;height:748px;border-radius:26px;overflow:hidden;background:#f6f1e8;
        box-shadow:0 30px 70px -24px rgba(120,60,20,.55), 0 0 0 1px rgba(0,0,0,.06);
      }
      .panelframe iframe{width:392px;height:1880px;border:0;transform:translateY(0)}
    </style>
  </head>
  <body>
    <div class="shot">
      <div class="copy">
        <span class="badge">교사용 · 크롬 확장</span>
        <h1>엑셀 내용을<br /><span class="hl">나이스에 자동 입력</span></h1>
        <ul>
          <li><span class="chk">✓</span><span><b>학기말종합의견·행동특성및종합의견·창의적체험활동</b> 지원</span></li>
          <li><span class="chk">✓</span><span>나이스 화면의 <b>번호·이름으로 템플릿 자동 생성</b></span></li>
          <li><span class="chk">✓</span><span>창의적체험활동은 <b>자율·자치활동·진로활동 2칸</b> 동시 입력</span></li>
          <li><span class="chk">✓</span><span>되돌리기 · <b>모든 처리는 브라우저 안에서만</b></span></li>
        </ul>
        <div class="foot">설치 후 툴바 아이콘 클릭 → 오른쪽 사이드패널</div>
      </div>
      <div class="panelframe">
        <iframe id="pf" src="../dist/neis-autofill/sidepanel.html" scrolling="no"></iframe>
      </div>
    </div>
    <script>
      // 프로모션 이미지의 사이드패널을 항상 라이트 모드로 고정
      document.getElementById("pf").addEventListener("load", function () {
        try {
          this.contentDocument.documentElement.setAttribute("data-theme", "light");
        } catch (e) {}
      });
    </script>
  </body>
</html>
