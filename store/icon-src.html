<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,body{margin:0;background:#0000}
      .wrap{width:512px;height:512px}
      svg{display:block}
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e79a49" />
            <stop offset="0.55" stop-color="#c85f34" />
            <stop offset="1" stop-color="#a8482a" />
          </linearGradient>
          <radialGradient id="gloss" cx="0.3" cy="0.15" r="0.9">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.30" />
            <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>
          <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff" />
            <stop offset="1" stop-color="#fdf3ea" />
          </linearGradient>
          <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#5a2410" flood-opacity="0.28" />
          </filter>
        </defs>

        <!-- 배경 스퀘어클 -->
        <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#bg)" />
        <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#gloss)" />

        <!-- 스프레드시트 카드 -->
        <g filter="url(#ds)">
          <rect x="120" y="112" width="272" height="288" rx="30" fill="url(#sheet)" />
          <!-- 헤더행 (주황) -->
          <path d="M120 142 a30 30 0 0 1 30-30 h212 a30 30 0 0 1 30 30 v34 h-272 z" fill="#f0b27e" />
          <!-- 세로선 -->
          <line x1="211" y1="112" x2="211" y2="400" stroke="#f0d9c4" stroke-width="8" />
          <line x1="301" y1="112" x2="301" y2="400" stroke="#f0d9c4" stroke-width="8" />
          <!-- 가로선 -->
          <line x1="120" y1="242" x2="392" y2="242" stroke="#f0d9c4" stroke-width="8" />
          <line x1="120" y1="322" x2="392" y2="322" stroke="#f0d9c4" stroke-width="8" />
        </g>

        <!-- 자동입력 체크 배지 -->
        <g filter="url(#ds)">
          <circle cx="368" cy="372" r="66" fill="#4f9a5a" />
          <circle cx="368" cy="372" r="66" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.55" />
          <path d="M338 373 l20 21 l40 -44" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
        </g>
      </svg>
    </div>
  </body>
</html>
