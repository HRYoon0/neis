<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      html,body{margin:0}
      .tile{
        width:440px;height:280px;box-sizing:border-box;padding:34px 36px;
        display:flex;flex-direction:column;justify-content:center;gap:14px;
        background:radial-gradient(120% 90% at 12% 0%, #f39aae 0%, #e05a78 55%, #c23e5c 100%);
        font-family:system-ui,"Malgun Gothic",sans-serif;color:#fff;overflow:hidden;position:relative;
      }
      .badge{align-self:flex-start;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);
        font-weight:800;font-size:13px;padding:5px 12px;border-radius:999px}
      h1{font-size:34px;line-height:1.2;margin:0;letter-spacing:-1px;font-weight:800}
      p{margin:0;font-size:16px;font-weight:600;opacity:.95;line-height:1.35}
      .ico{position:absolute;right:-6px;bottom:-6px;width:172px;height:172px;opacity:.18}
    </style>
  </head>
  <body>
    <div class="tile">
      <span class="badge">교사용 · 크롬 확장</span>
      <h1>NEIS 종합의견<br />자동입력 도우미</h1>
      <p>엑셀 내용을 나이스에 한 번에 채우기</p>
      <div class="ico">
        <svg viewBox="0 0 512 512" fill="#fff">
          <rect x="146" y="212" width="196" height="30" rx="15" />
          <rect x="146" y="266" width="228" height="30" rx="15" />
          <rect x="146" y="320" width="150" height="30" rx="15" />
          <path d="M372 132 L385 165 L418 178 L385 191 L372 224 L359 191 L326 178 L359 165 Z" />
        </svg>
      </div>
    </div>
  </body>
</html>
