<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,body{margin:0;background:#f4efe7;font-family:system-ui,"Malgun Gothic",sans-serif}
      .sheet{width:900px;padding:28px 24px 34px;box-sizing:border-box}
      h2{margin:0 0 20px;color:#3b2f26;font-size:20px}
      .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
      .card{background:#fff;border:1px solid #e7dccb;border-radius:16px;padding:16px;text-align:center}
      .row{display:flex;align-items:center;justify-content:center;gap:14px}
      .num{display:inline-block;background:#8f7e6f;color:#fff;font-weight:800;font-size:13px;
        width:22px;height:22px;line-height:22px;border-radius:50%;margin-bottom:10px}
      .label{margin-top:12px;color:#5b4a3d;font-size:13px;font-weight:700}
      .mini{filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}
      svg{display:block}
    </style>
  </head>
  <body>
    <div class="sheet">
      <h2>1번 아이콘 색감 후보 (왼쪽 큰 것 / 오른쪽 16px 느낌)</h2>
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <radialGradient id="gloss" cx="0.3" cy="0.15" r="0.9">
            <stop offset="0" stop-color="#fff" stop-opacity="0.30" /><stop offset="0.5" stop-color="#fff" stop-opacity="0" />
          </radialGradient>
          <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#1a1a1a" flood-opacity="0.24" />
          </filter>
          <!-- 색상 그라디언트들 -->
          <linearGradient id="cA" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e79a49"/><stop offset=".55" stop-color="#c85f34"/><stop offset="1" stop-color="#a8482a"/></linearGradient>
          <linearGradient id="cB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5aa6f5"/><stop offset=".55" stop-color="#3a6fd8"/><stop offset="1" stop-color="#274fb0"/></linearGradient>
          <linearGradient id="cC" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#48cfa9"/><stop offset=".55" stop-color="#1fa886"/><stop offset="1" stop-color="#127d5f"/></linearGradient>
          <linearGradient id="cD" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9a86f2"/><stop offset=".55" stop-color="#6f5ae2"/><stop offset="1" stop-color="#5340c6"/></linearGradient>
          <linearGradient id="cE" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f39aae"/><stop offset=".55" stop-color="#e05a78"/><stop offset="1" stop-color="#c23e5c"/></linearGradient>
          <linearGradient id="cF" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5c6b86"/><stop offset=".55" stop-color="#3b4a63"/><stop offset="1" stop-color="#28324b"/></linearGradient>
        </defs>
      </svg>

      <div class="grid" id="grid"></div>
    </div>
    <script>
      const glyph = `
        <g filter="url(#ds)">
          <g fill="#fff">
            <rect x="146" y="212" width="196" height="30" rx="15" />
            <rect x="146" y="266" width="228" height="30" rx="15" />
            <rect x="146" y="320" width="150" height="30" rx="15" />
          </g>
          <path fill="#fff" d="M372 132 L385 165 L418 178 L385 191 L372 224 L359 191 L326 178 L359 165 Z" />
        </g>`;
      const icon = (grad, size) => `<svg width="${size}" height="${size}" viewBox="0 0 512 512" ${size<60?'class="mini"':''}>
        <rect width="512" height="512" rx="118" fill="url(#${grad})"/>
        <rect width="512" height="512" rx="118" fill="url(#gloss)"/>${glyph}</svg>`;
      const items = [
        ["cA","오렌지(현재)"],["cB","블루"],["cC","틸/그린"],
        ["cD","퍼플"],["cE","로즈"],["cF","네이비/슬레이트"],
      ];
      document.getElementById("grid").innerHTML = items.map(([g,name],i)=>`
        <div class="card"><span class="num">${i+1}</span>
          <div class="row">${icon(g,140)}${icon(g,40)}</div>
          <div class="label">${name}</div></div>`).join("");
    </script>
  </body>
</html>
