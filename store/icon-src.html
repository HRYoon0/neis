<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,body{margin:0;background:#0000}
      svg{display:block}
    </style>
  </head>
  <body>
    <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#e79a49" />
          <stop offset="0.55" stop-color="#c85f34" />
          <stop offset="1" stop-color="#a8482a" />
        </linearGradient>
        <radialGradient id="gloss" cx="0.3" cy="0.15" r="0.9">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.30" />
          <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>
        <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#5a2410" flood-opacity="0.30" />
        </filter>
      </defs>

      <!-- 배경 스퀘어클 -->
      <rect width="512" height="512" rx="118" fill="url(#bg)" />
      <rect width="512" height="512" rx="118" fill="url(#gloss)" />

      <!-- 반짝임(마법처럼 자동으로 쉽게) -->
      <g fill="#ffffff" filter="url(#ds)">
        <!-- 큰 스파클 -->
        <path d="M300 120 L327 188 L395 215 L327 242 L300 310 L273 242 L205 215 L273 188 Z" />
        <!-- 중간 스파클 -->
        <path d="M190 276 L203 307 L234 320 L203 333 L190 364 L177 333 L146 320 L177 307 Z" fill-opacity="0.95" />
        <!-- 작은 스파클 -->
        <path d="M348 316 L356 334 L374 342 L356 350 L348 368 L340 350 L322 342 L340 334 Z" fill-opacity="0.9" />
      </g>
    </svg>
  </body>
</html>
